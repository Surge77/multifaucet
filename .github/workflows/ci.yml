name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

      - name: Assert no server secrets leaked into client bundle
        run: |
          if grep -rIl --include='*.js' -E 'ALCHEMY_API_KEY|COINGECKO_API_KEY|DEPLOYER_PRIVATE_KEY' .next/static; then
            echo "::error::Server secret string found in client bundle"
            exit 1
          fi
          echo "No server secrets found in client bundle."

  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Coverage (faucet sources must stay 100%)
        run: forge coverage --no-match-coverage "(script|test)" --report summary
